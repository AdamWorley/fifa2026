name = "fifa2026-sweepstake"
compatibility_date = "2026-06-01"
pages_build_output_dir = "dist"

[vars]
# Source of truth for fixtures/scores — the public-domain openfootball dataset.
# Override here if you point at a fork/mirror.
WC_DATA_URL = "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json"

# Durable store for the latest normalized results (goals → standings input).
# The /api/results function reads from here and refreshes it in the background.
[[kv_namespaces]]
binding = "RESULTS_KV"
id = "b7ced142b952494bbec0db08c55aab6d"
