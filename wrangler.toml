name = "fifa2026-sweepstake"
compatibility_date = "2026-06-01"
pages_build_output_dir = "dist"

# Secret (set with: npx wrangler pages secret put FOOTBALL_API_KEY)
#   FOOTBALL_API_KEY = "<api-football key from api-sports.io>"
#
# Optional non-secret config via [vars]:
[vars]
# API-FOOTBALL league id for the FIFA World Cup, and the season year.
FOOTBALL_LEAGUE_ID = "1"
FOOTBALL_SEASON = "2026"

# Durable store for the latest normalized results (goals, cards, standings input).
# The /api/results function reads from here and refreshes it from the API.
[[kv_namespaces]]
binding = "RESULTS_KV"
id = "b7ced142b952494bbec0db08c55aab6d"
